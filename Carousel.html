<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.carousel-item{
height:650px;
background-size:cover;
background-position:center;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

.carousel-content{
position:absolute;
top:50%;
left:10%;
transform:translateY(-50%);
color:white;
max-width:500px;
}

.carousel-content h1{
font-size:48px;
font-weight:bold;
margin-bottom:20px;
}

.search-box{
display:flex;
margin-bottom:20px;
}

.search-box input{
border:none;
padding:12px;
width:250px;
}

.search-box button{
background:#00a8ff;
border:none;
color:white;
padding:12px 20px;
}

.btn-secondary-custom{
background:#0b0c5a;
border:none;
color:white;
}

</style>

</head>

<body>

<div id="trafficCarousel" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<!-- Slide 1 -->
<div class="carousel-item active" style="background-image:url('https://images.unsplash.com/photo-1502877338535-766e1452684a');">

<div class="overlay"></div>

<div class="carousel-content">

<div class="search-box">
<input type="text" placeholder="Search Traffic Area...">
<button>Search</button>
</div>

<h1>Smart Traffic Management System</h1>

<button class="btn btn-secondary-custom px-4 py-2">View Dashboard</button>

</div>

</div>

<!-- Slide 2 -->
<div class="carousel-item" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d');">

<div class="overlay"></div>

<div class="carousel-content">

<div class="search-box">
<input type="text" placeholder="Search Traffic Area...">
<button>Search</button>
</div>

<h1>Real-Time Traffic Monitoring</h1>

<button class="btn btn-secondary-custom px-4 py-2">Get Details</button>

</div>

</div>

<!-- Slide 3 -->
<div class="carousel-item" style="background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156');">

<div class="overlay"></div>

<div class="carousel-content">

<div class="search-box">
<input type="text" placeholder="Search Traffic Area...">
<button>Search</button>
</div>

<h1>Reduce Traffic Congestion</h1>

<button class="btn btn-secondary-custom px-4 py-2">Contact Us</button>

</div>

</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#trafficCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#trafficCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
