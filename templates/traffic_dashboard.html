<!DOCTYPE html>
<html>
<head>
<title>Traffic Graph Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6fc;
font-family:Poppins;
}

.header{
background:#2d2a63;
color:white;
padding:20px;
text-align:center;
}

.chart-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.search-box{
max-width:400px;
margin:auto;
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="header">
<h2>Smart Traffic Graph Dashboard</h2>
</div>

<div class="container mt-5">

<!-- SEARCH CITY -->

<div class="search-box text-center">

<input id="cityInput" class="form-control mb-2" placeholder="Enter City (Delhi, Mumbai...)">

<button onclick="searchCity()" class="btn btn-primary">
Search Traffic
</button>

</div>

<div class="row">

<div class="col-md-6">
<div class="chart-box">
<h5 class="text-center">Traffic Distribution</h5>
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="chart-box">
<h5 class="text-center">Traffic Statistics</h5>
<canvas id="barChart"></canvas>
</div>
</div>

</div>

<div class="chart-box">
<h5 class="text-center">Traffic Flow</h5>
<canvas id="lineChart"></canvas>
</div>

</div>

<script>

let pieChart
let barChart
let lineChart

function createCharts(data){

let labels=["Vehicles","Signals","Emergency","Roads"]
let values=[
data.vehicles,
data.signals,
data.emergency,
data.roads
]

/* PIE */

if(pieChart) pieChart.destroy()

pieChart=new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:["#6a11cb","#ffb347","#ff4b2b","#2d2a63"]
}]
}

})

/* BAR */

if(barChart) barChart.destroy()

barChart=new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Traffic Data",
data:values,
backgroundColor:"#6a11cb"
}]
}

})

/* LINE */

if(lineChart) lineChart.destroy()

lineChart=new Chart(document.getElementById("lineChart"),{

type:"line",

data:{
labels:["6AM","9AM","12PM","3PM","6PM","9PM"],

datasets:[{
label:"Traffic Density",
data:[
values[0]*0.2,
values[0]*0.4,
values[0]*0.3,
values[0]*0.5,
values[0]*0.7,
values[0]*0.6
],
borderColor:"#ff4b2b",
backgroundColor:"rgba(255,75,43,0.2)",
fill:true
}]
}

})

}


/* SEARCH CITY */

async function searchCity(){

let city=document.getElementById("cityInput").value

if(city==""){
alert("Enter city name")
return
}

let res=await fetch("/search",{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({area:city})

})

let data=await res.json()

if(data.error){
alert("City not found")
return
}

createCharts(data)

}

/* LOAD DEFAULT DATA */

fetch("/traffic-data")
.then(res=>res.json())
.then(data=>createCharts(data))

</script>

</body>
</html>
