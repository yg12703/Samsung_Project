<!DOCTYPE html>
<html>
<head>
<title>Traffic Graph Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6fc;
font-family:Poppins;
}

.header{
background:#2d2a63;
color:white;
padding:20px;
text-align:center;
}

.chart-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="header">
<h2>Smart Traffic Graph Dashboard</h2>
</div>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">
<div class="chart-box">
<h5 class="text-center">Traffic Distribution</h5>
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="chart-box">
<h5 class="text-center">Traffic Statistics</h5>
<canvas id="barChart"></canvas>
</div>
</div>

</div>

<div class="chart-box">
<h5 class="text-center">Traffic Flow Over Time</h5>
<canvas id="lineChart"></canvas>
</div>

</div>

<script>

let trafficData

fetch("/traffic-data")
.then(res=>res.json())
.then(data=>{

trafficData=data

createPie()
createBar()
createLine()

})

function createPie(){

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:["Vehicles","Signals","Emergency","Roads"],

datasets:[{
data:[
trafficData.vehicles,
trafficData.signals,
trafficData.emergency,
trafficData.roads
],

backgroundColor:[
"#6a11cb",
"#ffb347",
"#ff4b2b",
"#2d2a63"
]
}]
}

})

}

function createBar(){

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:["Vehicles","Signals","Emergency","Roads"],

datasets:[{
label:"Traffic Data",
data:[
trafficData.vehicles,
trafficData.signals,
trafficData.emergency,
trafficData.roads
],
backgroundColor:"#6a11cb"
}]
},

options:{
responsive:true
}

})

}

function createLine(){

new Chart(document.getElementById("lineChart"),{

type:"line",

data:{
labels:["6AM","9AM","12PM","3PM","6PM","9PM"],

datasets:[{
label:"Traffic Density",
data:[
trafficData.vehicles*0.2,
trafficData.vehicles*0.4,
trafficData.vehicles*0.3,
trafficData.vehicles*0.5,
trafficData.vehicles*0.7,
trafficData.vehicles*0.6
],

borderColor:"#ff4b2b",
backgroundColor:"rgba(255,75,43,0.2)",
fill:true,
tension:0.4
}]
}

})

}

</script>

</body>
</html>
